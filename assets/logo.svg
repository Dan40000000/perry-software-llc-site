    <clipPath id="circle"><circle cx="80" cy="80" r="76"/></clipPath>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/></filter>
  </defs>
  <circle cx="80" cy="80" r="76" fill="url(#grad)"/>
