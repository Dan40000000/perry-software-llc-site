  <polygon points="22,109 14,134 30,134" fill="rgba(4,94,58,0.87)" clip-path="url(#circle)"/>
  <polygon points="22,101 13,124 31,124" fill="rgba(5,109,66,0.82)" clip-path="url(#circle)"/>
  <rect x="20" y="143" width="4" height="6" fill="rgba(28,16,4,0.67)" clip-path="url(#circle)"/>
